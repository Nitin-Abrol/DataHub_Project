# This is a Databricks asset bundle definition for DataHub_Project_Bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: DataHub_Project_Bundle
  uuid: b7f83253-c010-4e86-8dad-ed3d263b3038

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  warehouse_id:
    description: Ware house ID

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-19f354e8-cb5f.cloud.databricks.com
    variables:
      catalog: datahub
      schema: dev
      warehouse_id: 14a8e05db2411259
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-19f354e8-cb5f.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/nabrol2001@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/nabrol2001@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: datahub_prod
      schema: prod
      warehouse_id: 14a8e05db2411259
    permissions:
      - user_name: nabrol2001@gmail.com
        level: CAN_MANAGE
