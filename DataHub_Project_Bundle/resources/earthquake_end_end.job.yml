resources:
  jobs:
    Datahub_Earthquake_Job:
      name: Datahub_Earthquake_Job
      tasks:
        - task_key: Ingetion_Bronze
          notebook_task:
            notebook_path: ../src/Notebooks/Ingestion_Bronze.ipynb
            base_parameters:
              catalog_name: ${var.catalog}
            source: WORKSPACE
        - task_key: Bronze_to_Silver_EarthQuake_DT
          depends_on:
            - task_key: Ingetion_Bronze
          pipeline_task:
            pipeline_id: ${resources.pipelines.bronze_to_silver_earthquake_etl.id}
            full_refresh: false
        - task_key: Earthquake_Dashboard
          depends_on:
            - task_key: Bronze_to_Silver_EarthQuake_DT
          dashboard_task:
            subscription: {}
            warehouse_id: 14a8e05db2411259
            dashboard_id: ${resources.dashboards.earthquake_monitor.id}
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.catalog}
      performance_target: PERFORMANCE_OPTIMIZED
